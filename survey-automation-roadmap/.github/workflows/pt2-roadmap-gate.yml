name: PT2 Roadmap Gate

# on:
#   workflow_dispatch:
#   schedule:
#     - cron: "0 16 * * 1"

jobs:
  pt2-gate:
    runs-on: ubuntu-latest
    env:
      CRD_CONVERTER_COMMAND: "${{ github.workspace }}/scripts/converter --input {input} --output {output}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run PT II quality gate
        run: scripts/pt2_quality_gate.sh

      - name: Upload PT II artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pt2-gate-${{ github.run_number }}
          path: |
            artifacts/
            validation/golden_results.json
            validation/last_validation.md
          retention-days: 14
