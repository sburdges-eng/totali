version: "1"

project:
  qc_profile: "strict" # strict | standard | legacy
  baseline_namespace: null # Optional namespace for trend baseline state isolation

input:
  include_globs:
    - "TOTaLi/**/*"
  exclude_globs:
    - "artifacts/**/*"

normalization:
  trim_strings: true
  uppercase_field_code: true

validation:
  required_point_columns:
    - "Point#"
    - "Northing"
    - "Easting"
    - "Elevation"
    - "Description"
    - "DWG Description"
    - "DWG Layer"
    - "Locked"
    - "Group"
    - "Category"
    - "LS Number"
  required_field_code_columns:
    - "Field Code"
    - "Layer"
    - "Symbol"
    - "Linework"
  fail_if_all_files_invalid: true
  max_warning_count: null # Optional integer threshold for warning monitoring
  duplicate_point_id_mode: "all_occurrences" # all_occurrences | per_point_id | within_file
  unmapped_description_skip_categories: [] # Optional category names to skip for unmapped description QC
  trend_tracking:
    enabled: true
    fail_on_spike: true
    max_warning_delta: 100
    max_error_delta: 0
    max_critical_delta: 0
    baseline_manifest_path: null # Optional path to a specific baseline run_manifest.json
    state_file_path: null # Optional path for storing "last good run" baseline state
  coordinate_bounds:
    northing:
      min: 0
      max: 10000000
    easting:
      min: 0
      max: 10000000
    elevation:
      min: -1000
      max: 100000

crd:
  mode: "auto" # auto | converter_required | text_only
  converter_command: null # Example: "my-crd-converter --input {input} --output {output}"
  converter_failure_mode: "fatal" # fatal | quarantine (applies when mode=converter_required)

remediation:
  enabled: false
  fix_blank_field_codes: false
  drop_duplicate_tail_blocks: false
  drop_malformed_footer_rows: false

outputs:
  formats:
    - "csv"
    - "parquet"

presentation:
  enabled: true
  color_basis: "category_config" # currently supports only category_config
  category_colors:
    config: "#0072B2"
    data: "#009E73"
    environment: "#D55E00"
    converter: "#CC79A7"
  config_colors:
    qc_profile:
      strict: "#0072B2"
      standard: "#56B4E9"
      legacy: "#E69F00"
    crd_mode:
      auto: "#009E73"
      converter_required: "#D55E00"
      text_only: "#999999"
