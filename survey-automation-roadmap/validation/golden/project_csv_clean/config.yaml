version: "1"

input:
  include_globs:
    - "validation/golden/project_csv_clean/input/**/*"
  exclude_globs:
    - "artifacts/**/*"

normalization:
  trim_strings: true
  uppercase_field_code: true

validation:
  required_point_columns:
    - "Point#"
    - "Northing"
    - "Easting"
    - "Elevation"
    - "Description"
    - "DWG Description"
    - "DWG Layer"
    - "Locked"
    - "Group"
    - "Category"
    - "LS Number"
  fail_if_all_files_invalid: true
  max_warning_count: 10
  coordinate_bounds:
    northing:
      min: 0
      max: 10000000
    easting:
      min: 0
      max: 10000000
    elevation:
      min: -1000
      max: 100000

crd:
  mode: "auto"
  converter_command: null

outputs:
  formats:
    - "csv"
    - "parquet"
