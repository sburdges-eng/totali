version: "1"

input:
  include_globs:
    - "TOTaLi/**/*.csv"
    - "TOTaLi/**/*.dxf"
    - "TOTaLi/**/*.crd"
    - "TOTaLi/**/*.txt"
    - "TOTaLi/**/*.pts"
    - "TOTaLi/**/*.asc"
    - ".local-datasets/TOTaLi/**/*.csv"
    - ".local-datasets/TOTaLi/**/*.dxf"
    - ".local-datasets/TOTaLi/**/*.crd"
    - ".local-datasets/TOTaLi/**/*.txt"
    - ".local-datasets/TOTaLi/**/*.pts"
    - ".local-datasets/TOTaLi/**/*.asc"
  exclude_globs:
    - "artifacts/**/*"
    - "TOTaLi/IIII.dxf"
    - "TOTaLi/XR23173-Sur.dxf"
    - ".local-datasets/TOTaLi/IIII.dxf"
    - ".local-datasets/TOTaLi/XR23173-Sur.dxf"

normalization:
  trim_strings: true
  uppercase_field_code: true

validation:
  required_point_columns:
    - "Point#"
    - "Northing"
    - "Easting"
    - "Elevation"
    - "Description"
    - "DWG Description"
    - "DWG Layer"
    - "Locked"
    - "Group"
    - "Category"
    - "LS Number"
  required_field_code_columns:
    - "Field Code"
    - "Layer"
    - "Symbol"
    - "Linework"
  fail_if_all_files_invalid: true
  max_warning_count: 5000
  duplicate_point_id_mode: "within_file"
  unmapped_description_skip_categories:
    - "Converted"
  coordinate_bounds:
    northing:
      min: 0
      max: 10000000
    easting:
      min: 0
      max: 10000000
    elevation:
      min: -1000
      max: 100000

crd:
  mode: "converter_required"
  converter_command: "${CRD_CONVERTER_COMMAND}"

outputs:
  formats:
    - "csv"
    - "parquet"
