version: "1"

project:
  qc_profile: "strict"
  baseline_namespace: "samples-local"

input:
  include_globs:
    - "samples/input/**/*"
  exclude_globs:
    - "artifacts/**/*"

normalization:
  trim_strings: true
  uppercase_field_code: true

validation:
  required_point_columns:
    - "Point#"
    - "Northing"
    - "Easting"
    - "Elevation"
    - "Description"
    - "DWG Description"
    - "DWG Layer"
    - "Locked"
    - "Group"
    - "Category"
    - "LS Number"
  required_field_code_columns:
    - "Field Code"
    - "Layer"
    - "Symbol"
    - "Linework"
  fail_if_all_files_invalid: true
  max_warning_count: null
  duplicate_point_id_mode: "all_occurrences"
  unmapped_description_skip_categories: []
  trend_tracking:
    enabled: true
    fail_on_spike: true
    max_warning_delta: 100
    max_error_delta: 0
    max_critical_delta: 0
    baseline_manifest_path: null
    state_file_path: null
  coordinate_bounds:
    northing:
      min: 0
      max: 10000000
    easting:
      min: 0
      max: 10000000
    elevation:
      min: -1000
      max: 100000

crd:
  mode: "auto"
  converter_command: null
  converter_failure_mode: "fatal"

remediation:
  enabled: false
  fix_blank_field_codes: false
  drop_duplicate_tail_blocks: false
  drop_malformed_footer_rows: false

outputs:
  formats:
    - "csv"
    - "parquet"
